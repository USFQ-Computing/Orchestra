# PAM configuration for password synchronization
# This is inserted BEFORE pam_unix.so in /etc/pam.d/common-password by setup_nss_auto.sh
#
# Uses pam_script.so (libpam-script) instead of pam_exec.so because
# pam_exec.so expose_authtok is not supported for PAM_CHAUTHTOK in libpam 1.5.3.
# pam_script.so provides the new password in the PAM_AUTHTOK environment variable.
#
# sufficient: if the script exits 0 (DB user synced), skip pam_unix entirely.
#             if the script exits 1 (not a DB user), fall through to pam_unix.
# Script called: /etc/pam-script.d/pam_script_passwd -> /usr/local/bin/sync_password_change.sh
password    sufficient    pam_script.so dir=/etc/pam-script.d
